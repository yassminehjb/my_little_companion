<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Study Space ☁️✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <nav class="nav-bar">
            <div class="profile">
                <span class="avatar">🧸</span>
                <p>cozy space</p>
            </div>
            <div class="nav-links">
                <button class="nav-btn active">⏱️ Timer</button>
                <button class="nav-btn">📝 To-Do</button>
                <button class="nav-btn">📖 Diary</button>
        <button class="nav-btn">🎵 Lo-Fi</button>
                <button class="nav-btn">🌱 Status</button>
            </div>
        </nav>

        <main class="content-area">
            <div class="card pomo-card">
                <h2>☁️ Focus Session ☁️</h2>
                <div class="timer-display">25:00</div>
                <div class="btn-group">
                    <button class="action-btn btn-start">Start ✨</button>
                    <button class="action-btn btn-pause">Pause ☁️</button>
                    <button class="action-btn btn-reset">Reset 🔄</button>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
